name: Project CI

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: project-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flutter-quality-gate:
    name: Flutter Quality Gate
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mobile_app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Flutter web
        run: flutter config --enable-web

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Run static analysis
        run: flutter analyze

      - name: Run widget tests
        run: flutter test

      - name: Build web smoke test
        run: flutter build web --release

  backend-quality-gate:
    name: Backend Quality Gate
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Check Python syntax
        run: python -m compileall .

      - name: Import FastAPI app smoke test
        run: PYTHONPATH=. python -c "from apps.web_api.main import app; print(app.title)"
